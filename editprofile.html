<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - CCS Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>   
    .profile-image {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        border: 2px solid #0056b3;
        object-fit: cover;
        background-color: #f0f0f0;
        margin-bottom: 30px;
    }    

    .register-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .register-container {
        width: 100%;
        max-width: 900px;
        margin: auto;
    }
    
    input[readonly] {
        background-color: #f0f0f0;
        cursor: not-allowed;
        color: #777;
    }

    body {
        margin: 0;
        padding: 0;
    }
    </style>
</head>
<body>
        <nav class="navbar">
        <div class="logo-text">Edit Profile Students</div>
        <ul class="nav-links">
            <li><a href="#">✉ Notification 🔻</a></li>
            <li><a href="dashboard.html">🏠︎ Dashboard</a></li>
            <li><a href="editprofile.html" class="active">✎ Edit Profile</a></li>
            <li><a href="history.html">🕮 History</a></li>
            <li><a href="reservation.html">🗒 Reservation</a></li>
            <li><a href="javascript:void(0)" onclick="logout()" class="logout">➜] Logout</a></li>
        </ul>
    </nav>

    <div class="register-wrapper"> 
        <div class="register-container">
            <div class="register-content">
                
                <div class="form-column">
                    <div class="reg-header">
                        <div style="text-align: center; cursor: pointer;" onclick="document.getElementById('photoUpload').click()">
                            <div id="noPhotoPlaceholder" class="profile-image"></div>
                            <img id="profilePhoto" src="" alt="Student Photo" class="profile-image" style="display: none;">
                        </div>
                    </div>

                    <input type="file" id="photoUpload" accept="image/*" style="display: none;">

                    <form id="editProfileForm">
                        <div class="reg-input-group">
                            <input type="text" id="edit-id" placeholder="🪪 ID Number" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-lastName" placeholder="👤 Last Name" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-firstName" placeholder="👤 First Name" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-middleName" placeholder="👤 Middle Name">
                        </div>

                        <div class="row-group">
                            <div class="reg-input-group">
                                <input id="edit-yearLevel" list="course-levels" placeholder="🧑‍🎓 Year Level" required>
                                <datalist id="course-levels">
                                    <option value="1st year">
                                    <option value="2nd year">
                                    <option value="3rd year">
                                    <option value="4th year">
                                </datalist>
                            </div>

                            <div class="reg-input-group">
                                <input id="edit-course" list="courses" placeholder="📚 Course" required>
                                <datalist id="courses">
                                    <option value="BSIT">
                                    <option value="BSCS">
                                    <option value="BSCE">
                                    <option value="ACT">
                                </datalist>
                            </div>
                        </div>

                        <div class="reg-input-group">
                            <input type="email" id="edit-email" placeholder="✉️ Email" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-address" placeholder="🏠 Address" required>
                        </div>

                        <div class="btn-center">
                            <button type="submit" id="saveBtn" class="reg-submit-btn">Save</button>
                        </div>
                    </form>
                </div>

                <div class="image-column">
                    <img src="images/uc.png" alt="Edit Illustration">
                </div>
                
            </div>
        </div>
    </div>

<script>
async function logout() {
    const studentId = localStorage.getItem('loggedInId');
    
    const { isConfirmed } = await Swal.fire({
        title: 'Logout?',
        text: "This will end your current lab session and log you out.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#0056b3',
        confirmButtonText: 'Yes, Logout!'
    });

    if (isConfirmed) {
        try {

            if (studentId) {
                await fetch("http://localhost:3000/record-final-logout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idNumber: studentId })
                });
            }

            localStorage.removeItem('loggedInId');
            localStorage.removeItem('sessionExpiry');
            sessionStorage.clear();

            Swal.fire({
                icon: 'success',
                title: 'Logged Out',
                text: 'Your session has been closed.',
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'index.html';
            });
        } catch (err) {
            console.error("Logout error:", err);

            localStorage.removeItem('loggedInId');
            window.location.href = 'index.html';
        }
    }
}

let selectedPhoto = null;

document.addEventListener("DOMContentLoaded", async () => {
    const idNumber = localStorage.getItem("loggedInId");
    if (!idNumber) { 
        window.location.href = "index.html"; 
        return; 
    }

    let originalID = idNumber;

    try {
        const res = await fetch(`http://localhost:3000/student/${idNumber}`);
        const user = await res.json();

        if (res.ok) {
            originalID = user.idNumber;

            document.getElementById("edit-id").value = user.idNumber || "";
            document.getElementById("edit-lastName").value = user.lastName || "";
            document.getElementById("edit-firstName").value = user.firstName || "";
            document.getElementById("edit-middleName").value = user.middleName || "";
            document.getElementById("edit-yearLevel").value = user.yearLevel || "";
            document.getElementById("edit-course").value = user.course || "";
            document.getElementById("edit-email").value = user.email || "";
            document.getElementById("edit-address").value = user.address || "";

            if (user.profilePhoto) {

                selectedPhoto = user.profilePhoto;
                document.getElementById("profilePhoto").src = user.profilePhoto;
                document.getElementById("profilePhoto").style.display = "block";
                document.getElementById("noPhotoPlaceholder").style.display = "none";
            }
        }
    } catch (err) {
        console.error(err);
    }

    document.getElementById("photoUpload").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            selectedPhoto = event.target.result;

            document.getElementById("profilePhoto").src = selectedPhoto;
            document.getElementById("profilePhoto").style.display = "block";
            document.getElementById("noPhotoPlaceholder").style.display = "none";
        };
        reader.readAsDataURL(file);
    });

    const editForm = document.getElementById("editProfileForm");

    editForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        
        const saveBtn = document.getElementById("saveBtn");
        saveBtn.disabled = true;
        saveBtn.innerText = "Saving...";

        const updatedUser = {
            oldIdNumber: originalID,
            idNumber: document.getElementById("edit-id").value,
            lastName: document.getElementById("edit-lastName").value,
            firstName: document.getElementById("edit-firstName").value,
            middleName: document.getElementById("edit-middleName").value,
            yearLevel: document.getElementById("edit-yearLevel").value,
            course: document.getElementById("edit-course").value,
            email: document.getElementById("edit-email").value,
            address: document.getElementById("edit-address").value,
            profilePhoto: selectedPhoto 
        };

        try {
            const response = await fetch("http://localhost:3000/update-profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedUser)
            });

            if (response.ok) {
                localStorage.setItem("loggedInId", updatedUser.idNumber);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Profile Updated!',
                    text: 'Your changes have been saved.',
                    confirmButtonColor: '#0056b3',
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    timer: 5000,
                    timerProgressBar: true,
                }).then(() => {
                    window.location.href = 'dashboard.html';
                });
            } else {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save";
                Swal.fire('Error', 'Update failed. ID might be taken.', 'error');
            }
        } catch (error) {
            saveBtn.disabled = false;
            saveBtn.innerText = "Save";
            Swal.fire('Error', 'Server connection lost.', 'error');
        }
    });
});
</script>
</body>
</html>
