<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - CCS Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>   

    .register-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .register-container {
        width: 100%;
        max-width: 900px;
        margin: auto;
    }
    
    input[readonly] {
        background-color: #f0f0f0;
        cursor: not-allowed;
        color: #777;
    }

    body {
        margin: 0;
        padding: 0;
    }
    </style>
</head>
<body>
        <nav class="navbar">
        <div class="logo-text">Edit Profile Students</div>
        <ul class="nav-links">
            <li><a href="#">✉ Notification 🔻</a></li>
            <li><a href="dashboard.html">🏠︎ Dashboard</a></li>
            <li><a href="editprofile.html" class="active">✎ Edit Profile</a></li>
            <li><a href="history.html">🕮 History</a></li>
            <li><a href="reservation.html">🗒 Reservation</a></li>
            <li><a href="javascript:void(0)" onclick="logout()" class="logout">⏻ Logout</a></li>
        </ul>
    </nav>

    <div class="register-wrapper"> 
        <div class="register-container">
            <div class="register-content">
                
                <div class="form-column">
                    <div class="reg-header">
                        <img src="images/ccs.png" alt="Profile Icon">
                        <h1 class="align-left">Edit Profile</h1>
                    </div>

                    <!-- ✅ REMOVED onsubmit and changed to type="button" to fully prevent form submission -->
                    <form id="editProfileForm" onsubmit="return false;">
                        <div class="reg-input-group">
                            <input type="text" id="edit-id" placeholder="🪪 ID Number" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-lastName" placeholder="👤 Last Name" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-firstName" placeholder="👤 First Name" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-middleName" placeholder="👤 Middle Name">
                        </div>

                        <div class="row-group">
                            <div class="reg-input-group">
                                <input id="edit-yearLevel" list="course-levels" placeholder="🧑‍🎓 Year Level" required>
                                <datalist id="course-levels">
                                    <option value="1st year">
                                    <option value="2nd year">
                                    <option value="3rd year">
                                    <option value="4th year">
                                </datalist>
                            </div>

                            <div class="reg-input-group">
                                <input id="edit-course" list="courses" placeholder="📚 Course" required>
                                <datalist id="courses">
                                    <option value="BSIT">
                                    <option value="BSCS">
                                    <option value="BSCE">
                                    <option value="ACT">
                                </datalist>
                            </div>
                        </div>

                        <div class="reg-input-group">
                            <input type="email" id="edit-email" placeholder="✉️ Email" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-address" placeholder="🏠 Address" required>
                        </div>

                        <div class="btn-center">
                            <!-- ✅ type="button" prevents ANY accidental form submit -->
                            <button type="button" id="saveBtn" class="reg-submit-btn">Save</button>
                            <div class="cancel-center">
                                <a href="dashboard.html" class="cancel-btn">Back</a>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="image-column">
                    <img src="images/uc.png" alt="Edit Illustration">
                </div>
                
            </div>
        </div>
    </div>

<script>
function logout() {
    Swal.fire({
        title: 'Logout?',
        text: "Are you sure you want to end your session?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#0056b3',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, Logout!',
        cancelButtonText: 'Cancel'
    }).then((result) => {
        if (result.isConfirmed) {
            localStorage.removeItem('loggedInId');
            window.location.href = 'index.html';
        }
    });
}

document.addEventListener("DOMContentLoaded", async () => {
    const idNumber = localStorage.getItem("loggedInId");
    if (!idNumber) { 
        window.location.href = "index.html"; 
        return; 
    }

    let originalID = idNumber;

    try {
        const res = await fetch(`http://localhost:3000/student/${idNumber}`);
        const user = await res.json();

        if (res.ok) {
            originalID = user.idNumber;

            document.getElementById("edit-id").value = user.idNumber || "";
            document.getElementById("edit-lastName").value = user.lastName || "";
            document.getElementById("edit-firstName").value = user.firstName || "";
            document.getElementById("edit-middleName").value = user.middleName || "";
            document.getElementById("edit-yearLevel").value = user.yearLevel || "";
            document.getElementById("edit-course").value = user.course || "";
            document.getElementById("edit-email").value = user.email || "";
            document.getElementById("edit-address").value = user.address || "";
        }
    } catch (err) {
        console.error(err);
    }

    // ✅ FIX: Disable button immediately on first click to prevent double-firing
    const saveBtn = document.getElementById("saveBtn");

    saveBtn.addEventListener("click", async function (e) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        saveBtn.disabled = true;

        const updatedUser = {
            oldIdNumber: originalID,
            idNumber: document.getElementById("edit-id").value,
            lastName: document.getElementById("edit-lastName").value,
            firstName: document.getElementById("edit-firstName").value,
            middleName: document.getElementById("edit-middleName").value,
            yearLevel: document.getElementById("edit-yearLevel").value,
            course: document.getElementById("edit-course").value,
            email: document.getElementById("edit-email").value,
            address: document.getElementById("edit-address").value
        };

        try {
            const response = await fetch("http://localhost:3000/update-profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedUser)
            });

            if (response.ok) {
                localStorage.setItem("loggedInId", updatedUser.idNumber);
                sessionStorage.setItem("profileUpdated", "true");

                Swal.fire({
                    icon: 'success',
                    title: 'Saved!',
                    text: 'Profile updated successfully!',
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#0056b3',
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    timer: undefined,
                    timerProgressBar: false,
                    heightAuto: false  // ✅ Prevents layout shift from closing popup
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = 'dashboard.html';
                    }
                });

            } else {
                saveBtn.disabled = false;
                Swal.fire('❌ Update Failed', 'ID might be taken.', 'error');
            }
        } catch (error) {
            saveBtn.disabled = false;
            Swal.fire('❌ Error', 'Server connection lost.', 'error');
        }
    });
});
</script>
</body>
</html>
