<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - CCS Portal</title>
    <link rel="stylesheet" href="style.css"> 
    <style>   
        .register-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        input[readonly] {
            background-color: #f0f0f0;
            cursor: not-allowed;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="register-wrapper"> 
        <div class="register-container">
            <div class="register-content">
                
                <div class="form-column">
                    <div class="reg-header">
                        <img src="images/ccs.png" alt="Profile Icon">
                        <h1 class="align-left">Edit Profile</h1>
                    </div>

                    <form id="editProfileForm" style="margin-top: 20px;">
                        <div class="reg-input-group">
                            <input type="text" id="edit-id" placeholder="🪪 ID Number" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-lastName" placeholder="👤 Last Name" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-firstName" placeholder="👤 First Name" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-middleName" placeholder="👤 Middle Name">
                        </div>

                        <div class="row-group">
                            <div class="reg-input-group">
                                <input id="edit-yearLevel" list="course-levels" placeholder="🧑‍🎓 Year Level" required>
                                <datalist id="course-levels">
                                    <option value="1st year">
                                    <option value="2nd year">
                                    <option value="3rd year">
                                    <option value="4th year">
                                </datalist>
                            </div>

                            <div class="reg-input-group">
                                <input id="edit-course" list="courses" placeholder="📚 Course" required>
                                <datalist id="courses">
                                    <option value="BSIT">
                                    <option value="BSCS">
                                    <option value="BSCE">
                                    <option value="ACT">
                                </datalist>
                            </div>
                        </div>

                        <div class="reg-input-group">
                            <input type="email" id="edit-email" placeholder="✉️ Email" required>
                        </div>

                        <div class="reg-input-group">
                            <input type="text" id="edit-address" placeholder="🏠 Address" required>
                        </div>

                        <div class="btn-center">
                            <button type="submit" class="reg-submit-btn">Save</button>
                            <div class="cancel-center">
                                <a href="dashboard.html" class="cancel-btn">Back</a>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="image-column">
                    <img src="images/uc.png" alt="Edit Illustration">
                </div>
                
            </div>
        </div>
    </div>

    <script>
document.addEventListener("DOMContentLoaded", () => {
    const userData = localStorage.getItem("user");
    let originalID = ""; 

    if (userData && userData !== "undefined") {
        try {
            const user = JSON.parse(userData);
            originalID = user.idNumber; // Store the current ID as a reference

            // Fill all inputs (Ensure your HTML ID input is NOT 'readonly')
            document.getElementById("edit-id").value = originalID || "";
            document.getElementById("edit-lastName").value = user.lastName || "";
            document.getElementById("edit-firstName").value = user.firstName || "";
            document.getElementById("edit-middleName").value = user.middleName || "";
            document.getElementById("edit-yearLevel").value = user.yearLevel || "";
            document.getElementById("edit-course").value = user.course || "";
            document.getElementById("edit-email").value = user.email || "";
            document.getElementById("edit-address").value = user.address || "";
        } catch (error) {
            console.error("Error parsing user data:", error);
        }
    } else {
        window.location.href = "index.html"; // Redirect if no session exists
    }

    document.getElementById("editProfileForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const updatedUser = {
            oldIdNumber: originalID, // Sent to server to locate the record in klent.db
            idNumber: document.getElementById("edit-id").value,
            lastName: document.getElementById("edit-lastName").value,
            firstName: document.getElementById("edit-firstName").value,
            middleName: document.getElementById("edit-middleName").value,
            yearLevel: document.getElementById("edit-yearLevel").value,
            course: document.getElementById("edit-course").value,
            email: document.getElementById("edit-email").value,
            address: document.getElementById("edit-address").value
        };

        try {
            const response = await fetch("http://localhost:3000/update-profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedUser)
            });

            if (response.ok) {
                // Update LocalStorage so changes show on the Dashboard immediately
                localStorage.setItem("user", JSON.stringify(updatedUser));
                alert("Profile and ID updated successfully!");
                window.location.href = "dashboard.html";
            } else {
                alert("Update failed. Check if the new ID already exists.");
            }
        } catch (error) {
            alert("Connection error! Is your 'node server.js' running?");
        }
    });
});

    </script>
</body>
</html>
