<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CCS Sit-in Monitoring System</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>
<body>
    <nav class="navbar">
        <div class="logo-text">College of Computer Studies Sit-in Monitoring System</div>
        <ul class="nav-links">
            <li><a href="home.html">🏠︎ Home</a></li>
            <li><a href="#">🗫 Community</a></li>
            <li><a href="#">🛈 About</a></li>
            <li><a href="index.html" class="active">➜] Login</a></li>
            <li><a href="register.html">🗒 Register</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="left-logo-section">
            <img src="images/ccs.png" alt="CCS Logo">
        </div>

        <div class="right-form-section">
            <div class="login-card">
            <h4>Have an account?</h4>
            <h1>Sign In</h1>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginID" placeholder="🪪 Enter a Valid ID Number or Email" required>
                </div>

                <div class="input-group">
                    <input type="password" id="passwordField" placeholder="🔏 Enter Password" required>
                    <span class="password-toggle" onclick="toggleVisibility()">🧿</span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me"><input type="checkbox"> Remember me </label>

                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="login-button">Log in</button>
                
                <p class="register-text">Don't have an account? <a href="register.html" class="register-link">Sign Up</a></p>
            </form>
        </div>
    </div>

</body>
<script>
function toggleVisibility() {
    const passwordInput = document.getElementById("passwordField");
    const toggleIcon = document.querySelector(".password-toggle");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.textContent = "🚫";
    } else {
        passwordInput.type = "password";
        toggleIcon.textContent = "🧿";
    }
}

const form = document.querySelector('#loginForm');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginInput = document.getElementById('loginID').value.trim().toLowerCase();
    const password = document.getElementById('passwordField').value.trim();

    // ================= ADMIN LOGIN =================
    if (loginInput === "admin" && password === "admin123") {
        sessionStorage.setItem("adminWelcomeShown", "false");
        
        // Add the SweetAlert here
        Swal.fire({
            icon: "success",
            title: "Welcome, Admin!",
            text: "Welcome back, Admin. Preparing Sit-In Monitoring System...",
            timer: 1500,
            showConfirmButton: false
        }).then(() => {
            // Redirect only AFTER the alert is done
            window.location.href = "admindashboard.html";
        });
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginInput, password })
        });

        const data = await response.json();

        if (response.ok) {

            const fullName = `${data.user.firstName} ${data.user.lastName}`;
            localStorage.setItem("userName", fullName);

            localStorage.setItem("loggedInId", data.user.idNumber);
            localStorage.setItem("sessionExpiry", Date.now() + 10 * 60 * 1000);
            sessionStorage.setItem("justLoggedIn", "true");

            const firstName = data.user.firstName || "User";

            Swal.fire({
                icon: "success",
                title: `Login Successful, ${firstName}!`,
                text: "Welcome back!",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "dashboard.html";
            });

        } else {
            Swal.fire({
                icon: "error",
                title: "Login Failed",
                text: data.message
            });
        }

    } catch (error) {
        console.error("Error:", error);
        Swal.fire({
            icon: "error",
            title: "Server Error",
            text: "Please ensure your backend is running."
        });
    }
});
</script>
</html>
