<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CCS Sit-in Monitoring System</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <style>
        .theme-toggle-btn {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            padding: 3px;
            border-radius: 20px;
            transition: background 0.25s ease, transform 0.15s ease;
        }

        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateY(-1px);
        }

        [data-theme="dark"] .theme-toggle-btn {
            background: rgba(255,193,7,0.15);
            border-color: rgba(255,193,7,0.4);
            color: #ffc107;
        }
        
        /* ══════════════════════════════════════════════════════════
           DARK / LIGHT MODE — index.html (Login)
           Paste this block just before &lt;/style&gt;
        ══════════════════════════════════════════════════════════ */
 
        /* ── CSS Variables ── */
        :root {
            --bg-page:       #f0f2f5;
            --bg-card:       #ffffff;
            --bg-panel:      #2c3e70;
            --bg-input:      #f6f6f6;
            --text-main:     #1a1a2e;
            --text-muted:    #666666;
            --text-label:    #333333;
            --border-color:  #e3e6f0;
            --border-inner:  #dee2e6;
            --input-border:  #d1d3e2;
            --shadow:        0 10px 40px rgba(0,0,0,0.12);
            --scrollbar-bg:  #e0e0e0;
            --scrollbar-thumb: #b0b0b0;
        }
        [data-theme="dark"] {
            --bg-page:       #0f1117;
            --bg-card:       #1a1d27;
            --bg-panel:      #111827;
            --bg-input:      #252839;
            --text-main:     #e0e6f0;
            --text-muted:    #8892a4;
            --text-label:    #c8d0e0;
            --border-color:  #2a2f47;
            --border-inner:  #2e3450;
            --input-border:  #3a3f5c;
            --shadow:        0 10px 40px rgba(0,0,0,0.45);
            --scrollbar-bg:  #1e2235;
            --scrollbar-thumb: #3a3f5c;
        }
 
        /* ── Body & Navbar ── */
        body {
            background: var(--bg-page) !important;
            color: var(--text-main) !important;
            transition: background 0.3s ease, color 0.3s ease;
        }
        [data-theme="dark"] .navbar {
            background: linear-gradient(to right, #0d1117, #111827) !important;
        }
 
        /* ── Page background ── */
        .main-content {
            background: var(--bg-page) !important;
            transition: background 0.3s ease;
        }
        [data-theme="dark"] .main-content {
            background: linear-gradient(135deg, #0f1117 0%, #0f1117 100%) !important;
        }
 
        /* ── Login card ── */
        .login-card {
            background: var(--bg-card) !important;
            border-color: var(--border-color) !important;
            box-shadow: var(--shadow) !important;
            transition: background 0.3s, border-color 0.3s;
        }
 
        /* ── Left image panel ── */
        [data-theme="dark"] .card-image-panel {
            border-right-color: var(--border-inner) !important;
        }
 
        /* ── Right form panel ── */
        [data-theme="dark"] .card-form-panel {
            background: var(--bg-card) !important;
        }
        [data-theme="dark"] .card-form-panel h4 {
            color: var(--text-muted) !important;
        }
        [data-theme="dark"] .card-form-panel h1 {
            color: var(--text-main) !important;
        }
 
        /* ── Inputs ── */
        .input-group {
            background: var(--bg-input) !important;
            border-color: var(--input-border) !important;
            transition: background 0.3s, border-color 0.3s;
        }
        .input-group input {
            background: transparent !important;
            color: var(--text-main) !important;
        }
        .input-group input::placeholder {
            color: var(--text-muted) !important;
        }
        [data-theme="dark"] .input-group:focus-within {
            border-color: #4e73df !important;
        }
        [data-theme="dark"] .input-icon {
            color: var(--text-muted) !important;
        }
        [data-theme="dark"] .password-toggle {
            color: var(--text-muted) !important;
        }
        [data-theme="dark"] .password-toggle:hover {
            color: var(--text-main) !important;
        }
 
        /* ── Form options ── */
        [data-theme="dark"] .remember-me {
            color: var(--text-muted) !important;
        }
        [data-theme="dark"] .forgot-pass {
            color: #7b9cff !important;
        }
        [data-theme="dark"] .forgot-pass:hover {
            color: #a0bcff !important;
        }
 
        /* ── Register text ── */
        [data-theme="dark"] .register-text {
            color: var(--text-muted) !important;
        }
        [data-theme="dark"] .register-link {
            color: #7b9cff !important;
        }
        [data-theme="dark"] .register-link:hover {
            color: #a0bcff !important;
        }
 
        /* ── Nav links ── */
        [data-theme="dark"] .nav-links a {
            color: rgba(255,255,255,0.75) !important;
        }
        [data-theme="dark"] .nav-links a:hover,
        [data-theme="dark"] .nav-links a.active {
            color: #fff !important;
        }
 
        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    </style>
<body>
    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-desktop"></i> College of Computer Studies Sit-in Monitoring System</div>
        <ul class="nav-links">
            <li><a href="home.html"><i class="fa fa-home"></i> Home</a></li>
            <li><a href="#">🗫 Community</a></li>
            <li><a href="#">🛈 About</a></li>
            <li><a href="index.html" class="active"><i class="fa fa-right-to-bracket"></i> Login</a></li>
            <li><a href="register.html"><i class="fa fa-user-plus"></i> Register</a></li>
            <li>
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
                    <i class="fa-solid fa-moon" id="themeIcon"></i>
                    <span id="themeLabel"></span>
                </button>
            </li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="login-card">

            <div class="card-image-panel">
                <img src="images/ccs.png" alt="CCS Logo">
            </div>

            <div class="card-form-panel">
                <h4>Have an account?</h4>
                <h1>Sign In</h1>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fa fa-user input-icon"></i>
                        <input type="text" id="loginID" placeholder="ID Number or Email" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-lock input-icon"></i>
                        <input type="password" id="passwordField" placeholder="Password" required>
                        <span class="password-toggle" onclick="toggleVisibility()">
                            <i class="fa fa-eye"></i>
                        </span>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me"><input type="checkbox"> Remember me </label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-button"><i class="fa fa-right-to-bracket"></i> Login</button>
                    
                    <p class="register-text">Don't have an account? <a href="register.html" class="register-link">Sign Up</a></p>
                </form>
            </div>

        </div>
    </div>

</body>
<script>
/* ══════════════════════════════════════
   DARK / LIGHT MODE
══════════════════════════════════════ */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon  = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (theme === 'dark') {
        icon.className  = 'fa-solid fa-sun';
    } else {
        icon.className  = 'fa-solid fa-moon';
    }
}
 
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ccs_theme', next);
    applyTheme(next);
 
    // Animate the icon on toggle
    const icon = document.getElementById('themeIcon');
    icon.style.transform = 'rotate(360deg)';
    icon.style.transition = 'transform 0.4s ease';
    setTimeout(() => { icon.style.transform = ''; icon.style.transition = ''; }, 400);
}
 
// Load saved theme on page start
(function() {
    const saved = localStorage.getItem('ccs_theme') || 'light';
    applyTheme(saved);
})();

function toggleVisibility() {
    const passwordInput = document.getElementById("passwordField");
    const toggleIcon = document.querySelector(".password-toggle i");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        toggleIcon.classList.remove("fa-eye-slash");
        toggleIcon.classList.add("fa-eye");
    }
}

const form = document.querySelector('#loginForm');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginInput = document.getElementById('loginID').value.trim().toLowerCase();
    const password = document.getElementById('passwordField').value.trim();

    if (loginInput === "admin" && password === "admin123") {
        sessionStorage.setItem("adminWelcomeShown", "false");
        
        Swal.fire({
            icon: "success",
            title: "Welcome, Admin!",
            text: "Welcome back, Admin. Preparing Sit-In Monitoring System...",
            timer: 1500,
            showConfirmButton: false
        }).then(() => {

            window.location.href = "admindashboard.html";
        });
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginInput, password })
        });

        const data = await response.json();

        if (response.ok) {

            const fullName = `${data.user.firstName} ${data.user.lastName}`;
            localStorage.setItem("userName", fullName);

            localStorage.setItem("loggedInId", data.user.idNumber);
            localStorage.setItem("sessionExpiry", Date.now() + 10 * 60 * 1000);
            sessionStorage.setItem("justLoggedIn", "true");

            const firstName = data.user.firstName || "User";

            Swal.fire({
                icon: "success",
                title: `Login Successful, ${firstName}!`,
                text: "Welcome back!",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "dashboard.html";
            });

        } else {
            Swal.fire({
                icon: "error",
                title: "Login Failed",
                text: data.message
            });
        }

    } catch (error) {
        console.error("Error:", error);
        Swal.fire({
            icon: "error",
            title: "Server Error",
            text: "Please ensure your backend is running."
        });
    }
});
</script>
</html>
