<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - CCS Sit-in Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    .reservation-container {
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        margin-top: 50px;
    }

    .reservation-card {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        border: 1px solid #f0f0f0;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 800px;
        overflow: hidden;
    }

    .reservation-card select {
        flex: 1;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background-color: #f9f9f9;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .card-header {
        background: #2c3e70;
        color: white;
        padding: 15px;
        font-size: 25px;
        font-weight: 600;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin: -30px -30px 20px -30px;
        margin-bottom: 35px;
    }

    .reservation-card .input-group {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    .reservation-card label {
        width: 200px;
        font-weight: bold;
    }

    .reservation-card input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background-color: #f9f9f9;
    }

    .btn-blue {
        background-color: #4e73df;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 200px;
        transition: background-color 0.3s;
    }
    .btn-blue:hover {
        background-color: #da0ca6;
    }

    .reserve-button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 20px;
        transition: background-color 0.3s;
        font-weight: bold;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .reserve-button:hover {
        background-color: #218838;
    }

    .mt-20 { 
        margin-top: 15px; 
    }

    /* Pending notice banner */
    .pending-notice {
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 8px;
        padding: 12px 15px;
        margin-bottom: 20px;
        font-size: 13px;
        color: #856404;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .pending-notice i { font-size: 18px; }
</style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-calendar"></i> Student Reservation</div>
        <ul class="nav-links">
            <li><a href="#"><i class="fa fa-bell"></i> Notifications</a></li>
            <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="editprofile.html"><i class="fa fa-pencil"></i> Edit Profile</a></li>
            <li><a href="history.html"><i class="fa fa-history"></i> History</a></li>
            <li><a href="javascript:void(0)" class="active"><i class="fa fa-calendar"></i> Reservation</a></li>
            <li><a href="javascript:void(0)" onclick="logout(event)" class="logout"><i class="fa fa-sign-in"></i> Logout</a></li>
        </ul>
    </nav>

    <div class="reservation-container">
        <div class="reservation-card">

            <div class="card-header"><i class="fa-solid fa-calendar-check"></i> <span>Reservation</span></div>

            <div id="reservationForm">
                <div class="input-group">
                    <label style="font-size: 15px;"><i class="fa-solid fa-id-card"></i> ID Number:</label>
                    <input type="text" id="res-id" placeholder="Your ID Number" readonly>
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;"><i class="fa-solid fa-user"></i> Student Name:</label>
                    <input type="text" id="res-name" placeholder="Student Name" readonly>
                </div>
                
                <div class="input-group" style="margin-top: 40px;">
                    <label style="font-size: 15px;"><i class="fa-solid fa-bullseye"></i> Purpose:</label>
                    <select id="res-purpose">
                        <option value="C Programming">C Programming</option>
                        <option value="Java Projects">Java Projects</option>
                        <option value="Python/Data Science">Python/Data Science</option>
                        <option value="Web Development">Web Development</option>
                    </select>
                </div>

                <div class="input-group">
                    <label style="font-size: 15px;"><i class="fa-solid fa-computer"></i> Lab:</label>
                    <select id="res-lab">
                        <option value="524">524</option>
                        <option value="525">525</option>
                        <option value="526">526</option>
                        <option value="527">527</option>
                        <option value="528">528</option>
                    </select>
                </div>

                <div id="pc-selection-container" style="display: none; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px;">
                    <label style="font-size: 15px; display: block; margin-bottom: 10px; font-weight: bold;">
                        <i class="fa-solid fa-desktop"></i> Select Workstation:
                    </label>
                    <div id="pc-grid" style="display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; max-width: 100%;">
                    </div>
                    <input type="hidden" id="res-pc-number" value="">
                </div>
                
                <div class="input-group mt-20" style="margin-top: 40px;">
                    <label style="font-size: 15px;"><i class="fa-solid fa-clock"></i> Time In:</label>
                    <input type="time" id="res-time">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;"><i class="fa-solid fa-calendar-days"></i> Date:</label>
                    <input type="date" id="res-date">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;"><i class="fa-solid fa-hourglass-half"></i> Remaining Session:</label>
                    <input type="text" id="res-sessions" readonly>
                </div>

                <button type="button" id="finalReserveBtn" class="reserve-button" onclick="handleReservation(event)"><i class="fa-solid fa-paper-plane"></i> Reserve</button>

            </div>
        </div>
    </div>

<script>

    function generatePCGrid() {
        const pcContainer = document.getElementById('pc-selection-container');
        const pcGrid      = document.getElementById('pc-grid');
        const labSelect   = document.getElementById('res-lab');
 
        if (labSelect.value) {
            pcContainer.style.display = 'block';
            pcGrid.innerHTML = '';
            document.getElementById("res-pc-number").value = "";
 
            for (let i = 1; i <= 45; i++) {
                const btn = document.createElement('button');
                btn.type      = 'button';
                btn.innerText = `PC${i}`;
                btn.style.cssText = "padding: 8px 5px; font-size: 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 6px; background: #fff; transition: 0.2s;";
                
                btn.onclick = function () {
                    document.querySelectorAll('#pc-grid button').forEach(b => {
                        b.style.background = '#fff';
                        b.style.color      = '#000';
                    });
                    this.style.background = '#1cc88a';
                    this.style.color      = 'white';
                    document.getElementById('res-pc-number').value = `PC${i}`;
                };
                
                pcGrid.appendChild(btn);
            }
        } else {
            pcContainer.style.display = 'none';
        }
    }
 
    document.getElementById('res-lab').addEventListener('change', generatePCGrid);

    async function handleReservation(e) {
        if (e) e.preventDefault();
 
        const reservationData = {
            idNumber:         document.getElementById("res-id").value.trim(),
            studentName:      document.getElementById("res-name").value.trim(),
            purpose:          document.getElementById("res-purpose").value,
            lab:              document.getElementById("res-lab").value,
            pcNumber:         document.getElementById("res-pc-number").value,
            timeIn:           document.getElementById("res-time").value,
            date:             document.getElementById("res-date").value,
            remainingSession: document.getElementById("res-sessions").value
        };
 
        // Validations
        if (!reservationData.pcNumber) {
            Swal.fire('Wait!', 'Please select a workstation (PC1–PC45).', 'warning');
            return;
        }
        if (!reservationData.purpose || !reservationData.lab || !reservationData.timeIn || !reservationData.date) {
            Swal.fire('Wait!', 'Please fill in all the reservation details.', 'warning');
            return;
        }
 
        // Confirm before submitting
        const { isConfirmed } = await Swal.fire({
            title: 'Submit Reservation?',
            html: `
                <b>Lab:</b> ${reservationData.lab} &nbsp; <b>PC:</b> ${reservationData.pcNumber}<br>
                <b>Purpose:</b> ${reservationData.purpose}<br>
                <b>Date:</b> ${reservationData.date} &nbsp; <b>Time:</b> ${reservationData.timeIn}<br><br>
                <small style="color:#856404">⚠️ Your session will only be deducted after admin approval.</small>
            `,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#28a745',
            confirmButtonText: 'Yes, Submit!'
        });
 
        if (!isConfirmed) return;
 
        try {
            const response = await fetch("http://localhost:3000/make-reservation", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(reservationData)
            });
 
            const resultData = await response.json();
 
            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Request Submitted!',
                    html: 'Your reservation request is now <b>Pending</b>.<br>The admin will review and approve it shortly.',
                    confirmButtonColor: '#0056b3',
                    confirmButtonText: 'OK'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "history.html";
                    }
                });
            } else {
                Swal.fire('Error', resultData.message || 'Could not submit reservation. Try again.', 'error');
            }
        } catch (error) {
            console.error("Fetch error:", error);
            Swal.fire('Server Error', 'Make sure your server.js is running.', 'error');
        }
    }

    async function logout(e) {
        if (e) e.preventDefault();
        const studentId = localStorage.getItem('loggedInId');
        const { isConfirmed } = await Swal.fire({
            title: 'Logout?',
            text: "This will end your current sit-in session.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#0056b3',
            confirmButtonText: 'Yes, Logout!'
        });
 
        if (isConfirmed) {
            try {
                await fetch("http://localhost:3000/record-final-logout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idNumber: studentId })
                });
            } catch (err) { /* silent */ }
            localStorage.clear();
            window.location.href = 'index.html';
        }
    }
 
    document.addEventListener("DOMContentLoaded", async () => {
        const idNumber = localStorage.getItem("loggedInId");
        if (!idNumber) {
            window.location.href = "index.html";
            return;
        }
 
        try {
            const res = await fetch(`http://localhost:3000/student/${idNumber}`);
            if (res.ok) {
                const user = await res.json();
                document.getElementById("res-id").value       = user.idNumber || "";
                document.getElementById("res-name").value     = `${user.firstName} ${user.lastName}`;
                document.getElementById("res-sessions").value = user.remainingSession ?? 0;
            }
        } catch (err) {
            console.error("Error fetching student data:", err);
        }
 
    });
</script>
</body>
</html>
