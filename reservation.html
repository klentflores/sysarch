<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - CCS Sit-in Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
    .reservation-container {
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        margin-top: 50px;
    }

    .reservation-card {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        border: 1px solid #f0f0f0;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 800px;
    }

    .reservation-card h1 {
        text-align: center;
        margin-bottom: 50px;
    }

    .reservation-card .input-group {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    .reservation-card label {
        width: 200px;
        font-weight: bold;
    }

    .reservation-card input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background-color: #f9f9f9;
    }

    .btn-blue {
        background-color: #4e73df;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 200px;
        transition: background-color 0.3s;
    }
    .btn-blue:hover {
        background-color: #da0ca6;
    }

    .reserve-button {
        background-color: #4e73df;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
        transition: background-color 0.3s;
    }
    .reserve-button:hover {
        background-color: #da0ca6;
    }

    .mt-20 { 
        margin-top: 15px; 
    }
</style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-text">Reservation</div>
        <ul class="nav-links">
            <li><a href="javascript:void(0)">✉ Notification 🔻</a></li>
            <li><a href="dashboard.html">🏠︎ Dashboard</a></li>
            <li><a href="editprofile.html">✎ Edit Profile</a></li>
            <li><a href="history.html">🕮 History</a></li>
            <li><a href="javascript:void(0)" class="active">🗒 Reservation</a></li>
            <li><a href="javascript:void(0)" onclick="logout(event)" class="logout">⏻ Logout</a></li>
        </ul>
    </nav>

    <div class="reservation-container">
        <div class="reservation-card">
            <h1 style="font-size: 40px;">Reservation</h1>

            <div id="reservationForm">
                <div class="input-group">
                    <label style="font-size: 15px;">ID Number:</label>
                    <input type="text" id="res-id" placeholder="Your ID Number">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;">Student Name:</label>
                    <input type="text" id="res-name" placeholder="Student Name">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;">Purpose:</label>
                    <input type="text" id="res-purpose" placeholder="e.g. C Programming">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;">Lab:</label>
                    <input type="text" id="res-lab" placeholder="e.g. 524">
                </div>
                
                <div class="input-group mt-20">
                    <label style="font-size: 15px;">Time In:</label>
                    <input type="time" id="res-time">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;">Date:</label>
                    <input type="date" id="res-date">
                </div>
                <div class="input-group">
                    <label style="font-size: 15px;">Remaining Session:</label>
                    <input type="text" id="res-sessions" value=" ">
                </div>

                <button type="button" id="finalReserveBtn" class="reserve-button" onclick="handleReservation(event)">Reserve</button>

            </div>
        </div>
    </div>

<script>
    async function handleReservation(e) {
        if (e) e.preventDefault();

        // Gather Data from the inputs
        const reservationData = {
            idNumber: document.getElementById("res-id").value,
            studentName: document.getElementById("res-name").value, // Added name
            purpose:  document.getElementById("res-purpose").value,
            lab:      document.getElementById("res-lab").value,
            timeIn:   document.getElementById("res-time").value,
            date:     document.getElementById("res-date").value,
            remainingSession: document.getElementById("res-sessions").value // Added sessions
        };

        // Manual Validation: Ensure nothing is blank
        if (!reservationData.purpose || !reservationData.lab || !reservationData.timeIn || !reservationData.date) {
            Swal.fire('Wait!', 'Please fill in all the reservation details.', 'warning');
            return; 
        }

        try {
            const response = await fetch("http://localhost:3000/make-reservation", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(reservationData)
            });

            const resultData = await response.json();

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Reserved!',
                    text: 'Your reservation has been recorded successfully.',
                    confirmButtonColor: '#0056b3',
                    confirmButtonText: 'OK'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "history.html";
                    }
                });
            } else {
                // Shows the actual error message from your server.js
                Swal.fire('Error', resultData.message || 'Could not save reservation. Try again.', 'error');
            }
        } catch (error) {
            console.error("Fetch error:", error);
            Swal.fire('Server Error', 'Make sure your server.js is running.', 'error');
        }
    }

    async function logout(e) {
        if (e) e.preventDefault();
        const studentId = localStorage.getItem('loggedInId');
        const { isConfirmed } = await Swal.fire({
            title: 'Logout?',
            text: "This will end your current sit-in session.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#0056b3',
            confirmButtonText: 'Yes, Logout!'
        });

        if (isConfirmed) {
            try {
                await fetch("http://localhost:3000/record-final-logout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idNumber: studentId })
                });
                localStorage.clear();
                window.location.href = 'index.html';
            } catch (err) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const idNumber = localStorage.getItem("loggedInId");
        if (!idNumber) {
            window.location.href = "index.html";
            return;
        }

        try {
            const res = await fetch(`http://localhost:3000/student/${idNumber}`);
            if (res.ok) {
                const user = await res.json();
                document.getElementById("res-id").value = user.idNumber || "";
                document.getElementById("res-name").value = `${user.firstName} ${user.lastName}`;
                document.getElementById("res-sessions").value = user.remainingSession || 0;
            }
        } catch (err) {
            console.error("Error fetching student data:", err);
        }
    });
</script>
</body>
</html>
