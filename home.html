<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - CCS Sit-in Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .home-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8ecf3 100%);
            
        }
        .large-logo {
            width: 500px;
            height: auto;
            margin-top: 50px;
        }
        .welcome-text {
            font-size: 35px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .sub-text {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn-start {
            padding: 15px 25px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .btn-start:hover {
            background: #2d2d4e;
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-start::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-start:hover::after { 
            transform: translateX(100%); 
        }

        .theme-toggle-btn {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            padding: 3px;
            border-radius: 20px;
            transition: background 0.25s ease, transform 0.15s ease;
        }

        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateY(-1px);
        }

        [data-theme="dark"] .theme-toggle-btn {
            background: rgba(255,193,7,0.15);
            border-color: rgba(255,193,7,0.4);
            color: #ffc107;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-desktop"></i> College of Computer Studies Sit-in Monitoring System</div>
    </nav>
    <div class="home-wrapper">
        <div class="home-content">
            <img src="images/ccs.png" alt="CCS Logo" class="large-logo">
            
            <h1 class="welcome-text">Welcome to the CCS Sit-in Monitoring System</h1>
            <p class="sub-text">Managing student laboratory sessions with efficiency and security.</p>
            
            <a href="index.html" class="btn-start">Get Started <i class="fa fa-arrow-right"></i></a>
        </div>
    </div>
    
</body>
<script>
/* ══════════════════════════════════════
   DARK / LIGHT MODE
══════════════════════════════════════ */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon  = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (theme === 'dark') {
        icon.className  = 'fa-solid fa-sun';
    } else {
        icon.className  = 'fa-solid fa-moon';
    }
}
 
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ccs_theme', next);
    applyTheme(next);
 
    // Animate the icon on toggle
    const icon = document.getElementById('themeIcon');
    icon.style.transform = 'rotate(360deg)';
    icon.style.transition = 'transform 0.4s ease';
    setTimeout(() => { icon.style.transform = ''; icon.style.transition = ''; }, 400);
}
 
// Load saved theme on page start
(function() {
    const saved = localStorage.getItem('ccs_theme') || 'light';
    applyTheme(saved);
})();
</script>
</html>
