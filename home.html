<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - CCS Sit-in Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .home-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8ecf3 100%);
            
        }
        .large-logo {
            width: 500px;
            height: auto;
            margin-top: 50px;
        }
        .welcome-text {
            font-size: 35px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .sub-text {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn-start {
            padding: 15px 25px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .btn-start:hover {
            background: #2d2d4e;
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-start::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-start:hover::after { 
            transform: translateX(100%); 
        }

        .theme-toggle-btn {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            padding: 3px;
            border-radius: 20px;
            transition: background 0.25s ease, transform 0.15s ease;
        }

        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateY(-1px);
        }

        [data-theme="dark"] .theme-toggle-btn {
            background: rgba(255,193,7,0.15);
            border-color: rgba(255,193,7,0.4);
            color: #ffc107;
        }

        /* ══════════════════════════════════════════════════════════
           DARK / LIGHT MODE — home.html
           Paste this block just before &lt;/style&gt;
        ══════════════════════════════════════════════════════════ */
 
        /* ── CSS Variables ── */
        :root {
            --bg-page:       #f0f2f5;
            --bg-card:       #ffffff;
            --text-main:     #1a1a2e;
            --text-muted:    #666666;
            --border-color:  #e3e6f0;
            --scrollbar-bg:  #e0e0e0;
            --scrollbar-thumb: #b0b0b0;
        }
        [data-theme="dark"] {
            --bg-page:       #0f1117;
            --bg-card:       #1a1d27;
            --text-main:     #e0e6f0;
            --text-muted:    #8892a4;
            --border-color:  #2a2f47;
            --scrollbar-bg:  #1e2235;
            --scrollbar-thumb: #3a3f5c;
        }
 
        /* ── Body & Navbar ── */
        body {
            background: var(--bg-page) !important;
            color: var(--text-main) !important;
            transition: background 0.3s ease, color 0.3s ease;
        }
        [data-theme="dark"] .navbar {
            background: linear-gradient(to right, #0d1117, #111827) !important;
        }
 
        /* ── Home wrapper background ── */
        .home-wrapper {
            background: var(--bg-page) !important;
        }
        [data-theme="dark"] .home-wrapper {
            background: linear-gradient(135deg, #0f1117 0%, #0f1117 100%) !important;
        }
 
        /* ── Text ── */
        [data-theme="dark"] .welcome-text {
            color: #e0e6f0 !important;
        }
        [data-theme="dark"] .sub-text {
            color: #8892a4 !important;
        }
 
        /* ── Get Started button (keep it dark/branded, just soften in dark mode) ── */
        [data-theme="dark"] .btn-start {
            background: #1e2a50 !important;
            color: #7b9cff !important;
            border: 1px solid #2e3a6a !important;
        }
        [data-theme="dark"] .btn-start:hover {
            background: #263460 !important;
        }
 
        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-desktop"></i> College of Computer Studies Sit-in Monitoring System</div>
        <li>
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
                <i class="fa-solid fa-moon" id="themeIcon"></i>
                <span id="themeLabel"></span>
            </button>
        </li>
    </nav>
    <div class="home-wrapper">
        <div class="home-content">
            <img src="images/ccs.png" alt="CCS Logo" class="large-logo">
            
            <h1 class="welcome-text">Welcome to the CCS Sit-in Monitoring System</h1>
            <p class="sub-text">Managing student laboratory sessions with efficiency and security.</p>
            
            <a href="index.html" class="btn-start">Get Started <i class="fa fa-arrow-right"></i></a>
        </div>
    </div>
</body>
<script>
/* ══════════════════════════════════════
   DARK / LIGHT MODE
══════════════════════════════════════ */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon  = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (theme === 'dark') {
        icon.className  = 'fa-solid fa-sun';
    } else {
        icon.className  = 'fa-solid fa-moon';
    }
}
 
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ccs_theme', next);
    applyTheme(next);
 
    // Animate the icon on toggle
    const icon = document.getElementById('themeIcon');
    icon.style.transform = 'rotate(360deg)';
    icon.style.transition = 'transform 0.4s ease';
    setTimeout(() => { icon.style.transform = ''; icon.style.transition = ''; }, 400);
}
 
// Load saved theme on page start
(function() {
    const saved = localStorage.getItem('ccs_theme') || 'light';
    applyTheme(saved);
})();
</script>
</html>
