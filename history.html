<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Information - CCS Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .history-container {
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .history-card {
            background: white;
            width: 90%;
            max-width: 1200px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            
        }
        .card-header {
            background: #2c3e70;
            color: white;
            padding: 15px;
            font-size: 25px;
            font-weight: 600;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: -30px -30px 20px -30px;
            border-radius: 12px 12px 0 0;
        }
        
        .styled-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9em;
            
        }
        .styled-table thead tr {
            
            background-color: #2c3e70;
            color: #ffffff;
            text-align: left;
            
        }
        .styled-table th, .styled-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #dddddd;
        }

        .styled-table td {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .styled-table tbody tr:nth-of-type(even) {
            background-color: #f3f3f3;
        }
        .feedback-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .feedback-btn:hover {
            background-color: #218838;
            transform: translateY(-1px);
        }

        .table-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .styled-table th {
            cursor: pointer;
            user-select: none;
        }
        .sort-icon { 
            margin-left: 4px; 
            font-size: 0.75em; 
            opacity: 0.6; 
        }
        .sort-icon.asc::after  { content: '▲'; opacity: 1; }
        .sort-icon.desc::after { content: '▼'; opacity: 1; }
        .sort-icon:not(.asc):not(.desc)::after { content: '⇅'; }

        .table-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }
        #entryInfo { 
            font-size: 16px; color: #555; 
        }

        .pagination { 
            display: flex; 
            gap: 5px; 
        }

        .pagination button {
            min-width: 32px;
            height: 32px;
            border: 1px solid #dee2e6;
            background: white;
            color: #333;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .pagination button:hover:not(:disabled) { 
            background: #218838; 
        }

        .pagination button.active { 
            background: #28a745; 
            color: white; 
        }
        
        .pagination button:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }

        .empty-row td { 
            text-align: center; 
            color: #888; 
            padding: 30px; 
        }
        
        .notif-wrapper {
            position: relative;
        }

        .notif-badge {
            display: none;
            position: absolute;
            top: -4px;
            right: -6px;
            background: #e24b4a;
            color: white;
            font-size: 10px;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            align-items: center;
            justify-content: center;
            border: 2px solid #2c3e70;
        }

        .notif-dropdown {
            display: none;
            position: absolute;
            top: 36px;
            right: 0;
            width: 300px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            overflow: hidden;
        }

        .notif-header {
            background: #2c3e70;
            color: white;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: bold;
        }

        .notif-mark-btn {
            float: right;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            cursor: pointer;
        }

        .notif-list {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-history"></i> Student History</div>
        <ul class="nav-links">
            <li class="notif-wrapper">
                <a href="#" onclick="toggleNotifDropdown(event)">
                    <i class="fa fa-bell"></i> Notifications
                </a>
                <span id="notifBadge" class="notif-badge"></span>
                <div id="notifDropdown" class="notif-dropdown">
                    <div class="notif-header">
                        <i class="fa fa-bell"></i> Announcements
                        <button onclick="markAllRead()" class="notif-mark-btn">Mark all read</button>
                    </div>
                    <div id="notifList" class="notif-list"></div>
                </div>
            </li>
            <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="editprofile.html"><i class="fa fa-pencil"></i> Edit Profile</a></li>
            <li><a href="history.html" class="active"><i class="fa fa-history"></i> History</a></li>
            <li><a href="reservation.html"><i class="fa fa-calendar"></i> Reservation</a></li>
            <li><a href="javascript:void(0)" onclick="logout()" class="logout"><i class="fa fa-sign-in"></i> Logout</a></li>
        </ul>
    </nav>

    <div class="history-container">
        <div class="history-card">

            <div class="card-header">
                <i class="fa-solid fa-folder-open"></i>
                <span>History Information</span>
            </div>

            <div class="table-header-actions">
                <div class="entries-control">
                    Show
                    <select id="entryCount">
                        <option value="10">10</option>
                        <option value="25">25</option>
                    </select> Entries per page
                </div>
                <div class="search-container"><input type="text" id="tableSearch" placeholder="Search by Name or ID..."></div>
            </div>

            <table class="styled-table">
                <thead>
                    <tr>
                        <th data-col="idNumber">ID Number <span class="sort-icon" id="sort-idNumber"></span></th>
                        <th data-col="displayName">Name <span class="sort-icon" id="sort-displayName"></span></th>
                        <th data-col="purpose">Sit Purpose <span class="sort-icon" id="sort-purpose"></span></th>
                        <th data-col="lab">Laboratory <span class="sort-icon" id="sort-lab"></span></th>
                        <th data-col="displayIn">Login <span class="sort-icon" id="sort-displayIn"></span></th>
                        <th data-col="displayOut">Logout <span class="sort-icon" id="sort-displayOut"></span></th>
                        <th data-col="date">Date <span class="sort-icon" id="sort-date"></span></th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="historyData"></tbody>
            </table>

            <div class="table-footer">
                <p id="entryInfo">Showing 0 to 0 of 0 entries</p>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

<script>
let _announcements = [];

function toggleNotifDropdown(e) {
    e.preventDefault();
    const d = document.getElementById('notifDropdown');
    d.style.display = d.style.display === 'block' ? 'none' : 'block';
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('li:has(#notifDropdown)')) {
        const d = document.getElementById('notifDropdown');
        if (d) d.style.display = 'none';
    }
});

function getReadIds() { return JSON.parse(localStorage.getItem('readIds') || '[]'); }
function saveReadIds(ids) { localStorage.setItem('readIds', JSON.stringify(ids)); }

function markAllRead() {
    saveReadIds(_announcements.map(a => a.id));
    renderNotifs();
}

function renderNotifs() {
    const readIds = getReadIds();
    const unread = _announcements.filter(a => !readIds.includes(a.id)).length;
    const badge = document.getElementById('notifBadge');
    badge.textContent = unread;
    badge.style.display = unread > 0 ? 'flex' : 'none';

    document.getElementById('notifList').innerHTML = _announcements.length
        ? _announcements.map(a => `
            <div onclick="markOneRead(${a.id})" style="padding:12px 14px; border-bottom:1px solid #eee;
                cursor:pointer; background:${!readIds.includes(a.id) ? '#eaf3fb' : 'white'}">
                <div style="font-size:11px; color:#888;">${a.author} | ${a.date}</div>
                <div style="font-size:13px; color:#222; margin-top:3px;">${a.content}</div>
            </div>`).join('')
        : '<p style="text-align:center;color:#aaa;padding:20px;font-size:13px;">No announcements yet.</p>';
}

function markOneRead(id) {
    const ids = getReadIds();
    if (!ids.includes(id)) { ids.push(id); saveReadIds(ids); renderNotifs(); }
}

async function pollAnnouncements() {
    try {
        const res = await fetch('http://localhost:3000/announcements');
        _announcements = await res.json();
        renderNotifs();
    } catch(e) {}
}

pollAnnouncements();
setInterval(pollAnnouncements, 30000);


    let allData      = [];
    let filteredData = [];
    let currentPage  = 1;
    let perPage      = 10;
    let sortCol      = null;
    let sortDir      = "asc";

    function formatTime(timeStr) {
        if (!timeStr || timeStr === "null" || timeStr === "---") return "---";
        if (timeStr.includes("AM") || timeStr.includes("PM")) return timeStr; 

        try {
            let [hours, minutes] = timeStr.split(':');
            hours = parseInt(hours);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            return `${hours}:${minutes.substring(0,2)} ${ampm}`;
        } catch (e) {
            return timeStr;
        }
    }

    async function loadData() {
        const idNumber = localStorage.getItem("loggedInId");
        // Get name from localStorage. If it's missing, defaults to "Student"
        const sessionName = localStorage.getItem("userName") || "Student";

        if (!idNumber) { 
            window.location.href = "index.html"; 
            return; 
        }

        try {
            const res = await fetch(`http://localhost:3000/history/${idNumber}`);
            let rawData = await res.json();
            
            if (!Array.isArray(rawData)) {
                allData = [];
            } else {
                allData = rawData.map(row => {
                    return {
                        ...row,
                        // Fix the name using the session data
                        displayName: sessionName,
                        // Ensure Login and Logout are formatted to AM/PM
                        displayIn: formatTime(row.timeIn || row.login || "---"),
                        displayOut: (row.timeOut && row.timeOut !== "null") ? formatTime(row.timeOut) : "None"
                    };
                });
            }
        } catch(e) {
            allData = [];
            console.error("Failed to load history:", e);
        }

        filteredData = [...allData];
        updateSortIcons();
        render();
    }

    function render() {
        const start = (currentPage - 1) * perPage;
        const end   = Math.min(start + perPage, filteredData.length);
        const slice = filteredData.slice(start, end);
        const tbody = document.getElementById("historyData");
        const total = filteredData.length;

        if (slice.length === 0) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="8">No records found.</td></tr>`;
            document.getElementById("entryInfo").textContent = "Showing 0 to 0 of 0 entries";
        } else {
            tbody.innerHTML = slice.map(row => {

                const fullName = (row.firstName && row.lastName) 
                    ? `${row.firstName} ${row.lastName}` 
                    : 'Student';

                return `
                    <tr>
                        <td>${row.idNumber || 'N/A'}</td>
                        <td>${fullName}</td> 
                        <td>${row.purpose || 'N/A'}</td>
                        <td>${row.lab || 'N/A'}</td>
                        <td>${row.displayIn || row.timeIn}</td> 
                        <td>${row.displayOut || row.timeOut || 'None'}</td>
                        <td>${row.date || 'N/A'}</td>
                        <td><button class="feedback-btn" onclick="openFeedbackPopup('${row.idNumber}', '${row.lab}')">Feedback</button></td>
                    </tr>
                `;
            }).join("");
            
            document.getElementById("entryInfo").textContent =
                `Showing ${start + 1} to ${end} of ${total} ${total === 1 ? "entry" : "entries"}`;
        }

        renderPagination();
    }

    async function openFeedbackPopup(idNumber, lab) {
        const { value: text } = await Swal.fire({
            title: `Submit Feedback for ${lab}`,
            input: "textarea",
            inputLabel: "Tell us about your experience or report an issue:",
            inputPlaceholder: "Type your message here...",
            inputAttributes: {
                "aria-label": "Type your message here"
            },
            showCancelButton: true,
            confirmButtonColor: '#2c3e70',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Submit Feedback',
            preConfirm: (value) => {
                if (!value) {
                    Swal.showValidationMessage('Please enter a message first');
                }
            }
        });

        if (text) {
            try {
                const response = await fetch("http://localhost:3000/api/feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        idNumber: idNumber,
                        lab: lab,
                        message: text
                    })
                });

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Thank You!',
                        text: 'Your feedback has been sent to the admin.',
                        confirmButtonColor: '#28a745'
                    });
                } else {
                    throw new Error("Failed to send");
                }
            } catch (err) {
                console.error("Feedback error:", err);
                Swal.fire('Error', 'Could not send feedback. Is the server running?', 'error');
            }
        }
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredData.length / perPage) || 1;
        const pg = document.getElementById("pagination");
        let html = "";

        html += `<button onclick="goPage(1)" ${currentPage===1?"disabled":""}>«</button>`;
        html += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>‹</button>`;

        pageRange(currentPage, totalPages).forEach(p => {
            html += p === "…"
                ? `<button disabled>…</button>`
                : `<button class="${p===currentPage?"active":""}" onclick="goPage(${p})">${p}</button>`;
        });

        html += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?"disabled":""}>›</button>`;
        html += `<button onclick="goPage(${totalPages})" ${currentPage===totalPages?"disabled":""}>»</button>`;
        pg.innerHTML = html;
    }

    function pageRange(cur, total) {
        if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
        if (cur <= 4)       return [1,2,3,4,5,"…",total];
        if (cur >= total-3) return [1,"…",total-4,total-3,total-2,total-1,total];
        return [1,"…",cur-1,cur,cur+1,"…",total];
    }

    function goPage(p) {
        const totalPages = Math.ceil(filteredData.length / perPage) || 1;
        currentPage = Math.max(1, Math.min(p, totalPages));
        render();
    }

    document.getElementById("tableSearch").addEventListener("input", function() {
        const q = this.value.trim().toLowerCase();
        filteredData = allData.filter(row =>
            Object.values(row).some(v => String(v).toLowerCase().includes(q))
        );
        applySort();
        currentPage = 1;
        render();
    });

    document.getElementById("entryCount").addEventListener("change", function() {
        perPage = parseInt(this.value);
        currentPage = 1;
        render();
    });

    document.querySelectorAll("th[data-col]").forEach(th => {
        th.addEventListener("click", function() {
            const col = this.dataset.col;
            sortDir = (sortCol === col && sortDir === "asc") ? "desc" : "asc";
            sortCol = col;
            applySort();
            updateSortIcons();
            render();
        });
    });

    function applySort() {
        if (!sortCol) return;
        filteredData.sort((a, b) => {
            let va = String(a[sortCol] || "").toLowerCase();
            let vb = String(b[sortCol] || "").toLowerCase();
            return sortDir === "asc"
                ? va.localeCompare(vb, undefined, {numeric: true})
                : vb.localeCompare(va, undefined, {numeric: true});
        });
    }

    function updateSortIcons() {
        ["idNumber","displayName","purpose","lab","displayIn","displayOut","date"].forEach(c => {
            const el = document.getElementById(`sort-${c}`);
            if (!el) return;
            el.className = "sort-icon" + (sortCol === c ? " " + sortDir : "");
        });
    }

    loadData();
    
    async function logout() {
    const studentId = localStorage.getItem('loggedInId');
    
    const { isConfirmed } = await Swal.fire({
        title: 'Logout?',
        text: "This will end your current lab session and log you out.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#0056b3',
        confirmButtonText: 'Yes, Logout!'
    });

    if (isConfirmed) {
        try {
            if (studentId) {
                await fetch("http://localhost:3000/record-final-logout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idNumber: studentId })
                });
            }

            localStorage.removeItem('loggedInId');
            localStorage.removeItem('sessionExpiry');
            sessionStorage.clear();

            await Swal.fire({
                icon: 'success',
                title: 'Logged Out',
                text: 'Your session has been closed.',
                timer: 1500,
                showConfirmButton: false
            });
            window.location.href = 'index.html';
        } catch (err) {
            console.error("Logout error:", err);
            localStorage.removeItem('loggedInId');
            window.location.href = 'index.html';
        }
    }
}
</script>
</body>
</html>
